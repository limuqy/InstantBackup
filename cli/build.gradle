plugins {
    id 'application'
    id 'com.gradleup.shadow' version '8.3.5'
}

group = rootProject.group
version = mod_version

apply from: "${rootDir}/buildSrc/src/main/groovy/library-java.gradle"

repositories {
    mavenCentral()
}

dependencies {
    implementation project(':core')
    runtimeOnly 'org.slf4j:slf4j-simple:2.0.13'
}

application {
    mainClass = 'io.github.limuqy.mc.backup.cli.CliMain'
}

tasks.named('shadowJar') {
    archiveBaseName.set('instantbackup-cli')
    archiveClassifier.set('all')
    mergeServiceFiles()
}

tasks.named('build') {
    dependsOn shadowJar
}
